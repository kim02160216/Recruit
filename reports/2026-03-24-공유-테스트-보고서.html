<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공유 테스트 보고서</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #0A0E1A;
            color: #E8ECF4;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1140px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #141928 0%, #1E2D5A 50%, #1a2035 100%);
            border: 1px solid rgba(79, 142, 247, 0.15);
            border-radius: 20px;
            padding: 44px 52px;
            margin-bottom: 32px;
            text-align: center;
        }
        
        .title {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, #a8c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 16px;
            opacity: 0.7;
            font-weight: 500;
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .kpi-card {
            background: rgba(79, 142, 247, 0.06);
            border: 1px solid rgba(79, 142, 247, 0.15);
            border-radius: 14px;
            padding: 24px 28px;
            text-align: center;
        }
        
        .kpi-label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.4;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .kpi-value {
            font-size: 38px;
            font-weight: 800;
            color: #4F8EF7;
            margin-bottom: 4px;
        }
        
        .kpi-unit {
            font-size: 14px;
            opacity: 0.6;
            font-weight: 500;
        }
        
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .section-card {
            background: linear-gradient(145deg, #141928, #1a2035);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 28px 32px;
        }
        
        .section-title {
            border-left: 3px solid #4F8EF7;
            padding-left: 14px;
            font-size: 15px;
            font-weight: 600;
            color: #4F8EF7;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .metric-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .metric-item:last-child {
            border-bottom: none;
        }
        
        .metric-name {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.8;
        }
        
        .metric-value {
            font-size: 16px;
            font-weight: 700;
            color: #3FB950;
        }
        
        .delta-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .delta-positive {
            background: rgba(63, 185, 80, 0.15);
            color: #3FB950;
        }
        
        .highlight-card {
            background: linear-gradient(145deg, rgba(124, 92, 252, 0.08), rgba(79, 142, 247, 0.08));
            border: 1px solid rgba(124, 92, 252, 0.2);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        
        .highlight-title {
            font-size: 18px;
            font-weight: 700;
            color: #7C5CFC;
            margin-bottom: 12px;
        }
        
        .highlight-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #7C5CFC, #4F8EF7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .footer {
            text-align: center;
            padding: 40px 0 20px;
            opacity: 0.2;
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 32px 28px;
            }
            
            .title {
                font-size: 28px;
            }
            
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            
            .section-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">공유 테스트 보고서</h1>
            <p class="subtitle">Metacraft 플랫폼 현황 요약</p>
        </div>
        
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Monthly Active Users</div>
                <div class="kpi-value">420</div>
                <div class="kpi-unit">만명</div>
            </div>
            
            <div class="kpi-card">
                <div class="kpi-label">유료 전환율</div>
                <div class="kpi-value">4.8</div>
                <div class="kpi-unit">%</div>
            </div>
            
            <div class="kpi-card">
                <div class="kpi-label">월 매출</div>
                <div class="kpi-value">3.1</div>
                <div class="kpi-unit">억원</div>
            </div>
        </div>
        
        <div class="section-grid">
            <div class="section-card">
                <div class="section-title">플랫폼 성과</div>
                <div class="metric-item">
                    <span class="metric-name">Novelpia 챗플 세션</span>
                    <span class="metric-value">
                        증가
                        <span class="delta-badge delta-positive">+41%</span>
                    </span>
                </div>
                <div class="metric-item">
                    <span class="metric-name">Toptoon 필리핀 스튜디오</span>
                    <span class="metric-value" style="color: #4F8EF7;">안정화</span>
                </div>
            </div>
            
            <div class="highlight-card">
                <div class="highlight-title">Virtual Influencer</div>
                <div class="highlight-value">12,400</div>
                <div class="kpi-unit" style="opacity: 0.8; margin-top: 8px;">Instagram 팔로워 달성</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        Generated by Metacraft Analytics Dashboard
    </div>
</body>
</html>
