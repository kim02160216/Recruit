<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PH Studio 작업물</title>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const SUPA_URL = 'https://wsnkiwpvgonoycmnhicj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indzbmtpd3B2Z29ub3ljbW5oaWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTY5NDYsImV4cCI6MjA5MTI5Mjk0Nn0.9PgpGPJYc6XH8W1XgzGO3Wz5H0Cb2jUC-VFA2qF5Nho';
const hdrs = { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };
async function uploadImage(file) {
  const name = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + file.name.split('.').pop();
  const res = await fetch(SUPA_URL + '/storage/v1/object/uploads/' + name, { method: 'POST', headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': file.type }, body: file });
  if (!res.ok) throw new Error('Upload failed');
  return SUPA_URL + '/storage/v1/object/public/uploads/' + name;
}
function App() {
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showUpload, setShowUpload] = useState(false);
  const [title, setTitle] = useState("");
  const [files, setFiles] = useState([]);
  const [previews, setPreviews] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [viewImg, setViewImg] = useState(null);
  const fileRef = useRef(null);
  useEffect(() => { load(); }, []);
  const load = async () => {
    try {
      const res = await fetch(SUPA_URL + '/rest/v1/posts?order=created_at.desc', { headers: hdrs });
      const data = await res.json();
      setPosts(data || []);
    } catch(e) { console.error(e); }
    setLoading(false);
  };
  const handleFiles = (fileList) => {
    const arr = Array.from(fileList).filter(f => f.type.startsWith("image/"));
    setFiles(prev => [...prev, ...arr]);
    arr.forEach(file => { const r = new FileReader(); r.onload = (e) => setPreviews(p => [...p, e.target.result]); r.readAsDataURL(file); });
  };
  const submit = async () => {
    if (!files.length) return;
    setUploading(true);
    try {
      const urls = await Promise.all(files.map(f => uploadImage(f)));
      await fetch(SUPA_URL + '/rest/v1/posts', { method: 'POST', headers: { ...hdrs, Prefer: 'return=representation' }, body: JSON.stringify({ title: title.trim() || "제목 없음", images: urls }) });
      setTitle(""); setFiles([]); setPreviews([]); setShowUpload(false); load();
    } catch(e) { alert("업로드 실패: " + e.message); }
    setUploading(false);
  };
  const deletePost = async (id) => { if (!confirm("삭제하시겠습니까?")) return; await fetch(SUPA_URL + '/rest/v1/posts?id=eq.' + id, { method: 'DELETE', headers: hdrs }); load(); };
  const fmtDate = (d) => new Date(d).toLocaleDateString("ko-KR", { month:"long", day:"numeric", hour:"2-digit", minute:"2-digit" });
  if (loading) return React.createElement("div", { style: { padding: 40, textAlign: "center", color: "#999" } }, "불러오는 중...");
  return React.createElement("div", { style: { minHeight: "100vh", background: "#f7f5f2", fontFamily: "'Noto Sans KR', -apple-system, sans-serif" } },
    React.createElement("link", { href: "https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap", rel: "stylesheet" }),
    React.createElement("div", { style: { background: "#2c2520", padding: "24px", color: "#fff", display: "flex", justifyContent: "space-between", alignItems: "center" } },
      React.createElement("div", null,
        React.createElement("div", { style: { fontSize: 11, color: "#c44a24", fontWeight: 600, letterSpacing: 1.5, marginBottom: 4 } }, "PH STUDIO"),
        React.createElement("div", { style: { fontSize: 18, fontWeight: 700 } }, "작업물 보고")
      ),
      React.createElement("button", { onClick: () => { setShowUpload(!showUpload); setFiles([]); setPreviews([]); setTitle(""); }, style: { padding: "8px 20px", borderRadius: 8, border: "none", background: showUpload ? "#6b6058" : "#c44a24", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" } }, showUpload ? "취소" : "업로드")
    ),
    React.createElement("div", { style: { maxWidth: 720, margin: "0 auto", padding: "20px 16px 40px" } },
      showUpload && React.createElement("div", { style: { background: "#fff", borderRadius: 12, border: "1px solid #e0dbd4", padding: 24, marginBottom: 24 } },
        React.createElement("input", { type: "text", value: title, onChange: e => setTitle(e.target.value), placeholder: "제목 (예: EP.12 채색 결과물)", style: { width: "100%", padding: "10px 14px", border: "1px solid #ddd", borderRadius: 8, fontSize: 14, marginBottom: 14, outline: "none", fontFamily: "inherit", background: "#faf8f5" } }),
        React.createElement("div", { onDragOver: e => e.preventDefault(), onDrop: e => { e.preventDefault(); handleFiles(e.dataTransfer.files); }, onClick: () => fileRef.current && fileRef.current.click(), style: { border: "2px dashed #d0cbc4", borderRadius: 10, padding: "32px 20px", textAlign: "center", cursor: "pointer", background: "#faf8f5", marginBottom: 14 } },
          React.createElement("div", { style: { fontSize: 14, color: "#8a8078" } }, "클릭 또는 드래그하여 이미지 추가"),
          React.createElement("div", { style: { fontSize: 11, color: "#b0a89e", marginTop: 4 } }, "여러 장 가능")
        ),
        React.createElement("input", { ref: fileRef, type: "file", accept: "image/*", multiple: true, style: { display: "none" }, onChange: e => handleFiles(e.target.files) }),
        previews.length > 0 && React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 } }, previews.map((img, i) => React.createElement("div", { key: i, style: { position: "relative", width: 72, height: 72, borderRadius: 8, overflow: "hidden", border: "1px solid #eee" } }, React.createElement("img", { src: img, style: { width: "100%", height: "100%", objectFit: "cover" } }), React.createElement("button", { onClick: () => { setFiles(p => p.filter((_,idx) => idx!==i)); setPreviews(p => p.filter((_,idx) => idx!==i)); }, style: { position: "absolute", top: 2, right: 2, width: 18, height: 18, borderRadius: "50%", background: "rgba(0,0,0,0.5)", color: "#fff", border: "none", cursor: "pointer", fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center" } }, "x")))),
        React.createElement("button", { onClick: submit, disabled: !files.length || uploading, style: { width: "100%", padding: "11px", borderRadius: 8, border: "none", background: (!files.length || uploading) ? "#d0cbc4" : "#c44a24", color: "#fff", fontSize: 14, fontWeight: 600, cursor: (!files.length || uploading) ? "not-allowed" : "pointer", fontFamily: "inherit" } }, uploading ? "업로드 중..." : files.length ? "등록 (" + files.length + "장)" : "이미지를 추가해주세요")
      ),
      posts.length === 0 && !showUpload && React.createElement("div", { style: { textAlign: "center", padding: "80px 20px", color: "#a09890" } }, "아직 업로드된 작업물이 없습니다."),
      posts.map(post => React.createElement("div", { key: post.id, style: { background: "#fff", borderRadius: 12, border: "1px solid #e0dbd4", marginBottom: 16, overflow: "hidden" } },
        React.createElement("div", { style: { padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" } },
          React.createElement("div", null, React.createElement("div", { style: { fontSize: 15, fontWeight: 600, color: "#2c2520" } }, post.title), React.createElement("div", { style: { fontSize: 12, color: "#a09890", marginTop: 3 } }, fmtDate(post.created_at))),
          React.createElement("button", { onClick: () => deletePost(post.id), style: { fontSize: 11, color: "#c0b8ae", border: "none", background: "none", cursor: "pointer", fontFamily: "inherit" } }, "삭제")
        ),
        post.images && post.images.length > 0 && React.createElement("div", { style: { display: "grid", gridTemplateColumns: post.images.length === 1 ? "1fr" : "repeat(auto-fill, minmax(200px, 1fr))", gap: 2, padding: "0 2px 2px" } }, post.images.map((img, i) => React.createElement("div", { key: i, onClick: () => setViewImg(img), style: { cursor: "pointer", aspectRatio: post.images.length === 1 ? "auto" : "1", overflow: "hidden", background: "#f0ece6" } }, React.createElement("img", { src: img, style: { width: "100%", height: "100%", objectFit: post.images.length === 1 ? "contain" : "cover", display: "block" } }))))
      ))
    ),
    viewImg && React.createElement("div", { onClick: () => setViewImg(null), style: { position: "fixed", inset: 0, zIndex: 9999, background: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "zoom-out", padding: 20 } }, React.createElement("img", { src: viewImg, style: { maxWidth: "92vw", maxHeight: "92vh", borderRadius: 4 } }))
  );
}
ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
